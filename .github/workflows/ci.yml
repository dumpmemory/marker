name: CI tests

on: [push]

jobs:
  tests:
    runs-on: t4_gpu
    steps:
      - uses: actions/checkout@v4
      - name: Install apt requirements
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libharfbuzz0b libpangoft2-1.0-0 libgdk-pixbuf2.0-0 libcairo2 libffi-dev shared-mime-info
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest
          enable-cache: true
      - name: Set up Python 3.11
        run: uv python install 3.11
      - name: Install python dependencies
        run: uv sync --frozen --group dev --extra full
      - name: Run tests
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # T4 (Turing) lacks bf16 - vllm refuses to start with the default dtype
          VLLM_DTYPE: float16
        run: uv run pytest
